name: Actualizar datos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 1 * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Actualizar clientes desde Google Sheets
        run: python update_clientes.py

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/clientes_mensuales.json data/consolidado_ventas.csv
          if git diff --staged --quiet; then echo "Sin cambios"; else git commit -m "Actualización mensual de clientes — $(date +'%m/%Y')" && git push; fi
